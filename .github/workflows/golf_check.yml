name: 플라자CC 타이거 코스 조회

on:
  workflow_dispatch:       # GitHub 앱에서 수동 실행
  schedule:
    - cron: '0 22 * * *'  # 매일 오전 7시 KST (UTC 22:00) 자동 실행

jobs:
  check-golf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 골프 예약 조회 실행
        env:
          PLAZACC_ID:    ${{ secrets.PLAZACC_ID }}
          PLAZACC_PW:    ${{ secrets.PLAZACC_PW }}
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:  ${{ secrets.GMAIL_APP_PW }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
        run: python plaza_golf_server.py
